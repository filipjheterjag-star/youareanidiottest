      padding: 12px 24px;

<body>

  <h1>Click the button for something important</h1>
  <button onclick="startPrank()">Do Not Click</button>

  <script>
    function startPrank() {
      let count = 0;
      const maxPopups = 1000; // Safe limit

      const interval = setInterval(() => {
        alert("You are an idiot dumbass");

        count++;
        if (count >= maxPopups) {
          clearInterval(interval);
          alert("lululaa.");
        }
      }, 500);
    }
