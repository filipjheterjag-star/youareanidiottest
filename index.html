<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ultimate DVD Popup Demo</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 15%;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>

  <h1>DVD Window Bounce Demo</h1>
  <p>Educational popup demo (limited & safe)</p>

  <button onclick="openPopups()">Open Popups</button>
  <button onclick="closePopups()">Close All</button>

  <script>
    let popups = [];
    const maxPopups = 100;

    function openPopups() {
      for (let i = 0; i < maxPopups; i++) {

        const width = 400;
        const height = 300;

        const popup = window.open(
          "",
          "",
          `width=${width},height=${height}`
        );

        if (!popup) continue;

        popup.document.open();
        popup.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>DVD Bounce</title>
            <style>
              body {
                margin: 0;
                overflow: hidden;
                background: black;
                font-family: Arial, sans-serif;
              }
              #msg {
                position: absolute;
                font-size: 22px;
                font-weight: bold;
                color: lime;
              }
            </style>
          </head>
          <body>

            <div id="msg">You are an idiot 😜</div>

            <script>
              const msg = document.getElementById("msg");

              let x = 50, y = 50;
              let dx = 3, dy = 3;

              function randomColor() {
                const colors = ["lime","cyan","yellow","magenta","orange","red"];
                return colors[Math.floor(Math.random()*colors.length)];
              }

              function animateText() {
                const maxX = window.innerWidth - msg.offsetWidth;
                const maxY = window.innerHeight - msg.offsetHeight;

                x += dx;
                y += dy;

                if (x <= 0 || x >= maxX) {
                  dx *= -1;
                  msg.style.color = randomColor();
                }

                if (y <= 0 || y >= maxY) {
                  dy *= -1;
                  msg.style.color = randomColor();
                }

                msg.style.left = x + "px";
                msg.style.top = y + "px";

                requestAnimationFrame(animateText);
              }

              animateText();
            <\/script>

          </body>
          </html>
        `);
        popup.document.close();

        // --- WINDOW BOUNCE LOGIC ---
        let winX = Math.random() * (screen.width - width);
        let winY = Math.random() * (screen.height - height);
        let winDX = 4;
        let winDY = 4;

        function animateWindow() {
          if (!popup || popup.closed) return;

          winX += winDX;
          winY += winDY;

          if (winX <= 0 || winX >= screen.width - width) {
            winDX *= -1;
          }

          if (winY <= 0 || winY >= screen.height - height) {
            winDY *= -1;
          }

          popup.moveTo(winX, winY);
          requestAnimationFrame(animateWindow);
        }

        animateWindow();

        popups.push(popup);
      }
    }

    function closePopups() {
      popups.forEach(p => {
        if (p && !p.closed) p.close();
      });
      popups = [];
    }
  </script>

</body>
</html>
