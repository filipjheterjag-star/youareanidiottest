<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DVD Popup Demo</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 15%;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>

  <h1>DVD Bouncing Popup Demo</h1>
  <p>Educational popup demo (limited & safe)</p>

  <button onclick="openPopups()">Open Popups</button>
  <button onclick="closePopups()">Close All</button>

  <script>
    let popups = [];
    const maxPopups = 100;

    function openPopups() {
      for (let i = 0; i < maxPopups; i++) {

        const popup = window.open(
          "",
          "",
          "width=400,height=300"
        );

        if (!popup) continue;

        popup.document.open();
        popup.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>DVD Bounce</title>
            <style>
              body {
                margin: 0;
                overflow: hidden;
                background: black;
                color: lime;
                font-family: Arial, sans-serif;
              }
              #message {
                position: absolute;
                font-size: 22px;
                font-weight: bold;
              }
            </style>
          </head>
          <body>

            <div id="message">You are an iidiot 😜</div>

            <script>
              const msg = document.getElementById("message");

              let x = 50;
              let y = 50;
              let dx = 3;
              let dy = 3;

              function randomColor() {
                const colors = ["lime","cyan","yellow","magenta","orange","red"];
                return colors[Math.floor(Math.random()*colors.length)];
              }

              function animate() {
                const maxX = window.innerWidth - msg.offsetWidth;
                const maxY = window.innerHeight - msg.offsetHeight;

                x += dx;
                y += dy;

                if (x <= 0 || x >= maxX) {
                  dx *= -1;
                  msg.style.color = randomColor();
                }

                if (y <= 0 || y >= maxY) {
                  dy *= -1;
                  msg.style.color = randomColor();
                }

                msg.style.left = x + "px";
                msg.style.top = y + "px";

                requestAnimationFrame(animate);
              }

              animate();
            <\/script>

          </body>
          </html>
        `);
        popup.document.close();

        popups.push(popup);
      }
    }

    function closePopups() {
      popups.forEach(p => {
        if (p && !p.closed) p.close();
      });
      popups = [];
    }
  </script>

</body>
</html>
